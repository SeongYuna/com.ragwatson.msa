# flutter_app/analysis_options.yaml
#
# [하네스 엔지니어링 목적]
# 기본 flutter_lints 위에 하네스 규칙을 추가한다.
# 경고(warning)가 아닌 에러(error)로 강제하여 CI에서 통과 기준을 엄격히 설정한다.
# dart_code_metrics로 함수 복잡도·길이를 수치로 제한한다.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # 하네스 핵심: 경고를 에러로 승격 → CI 강제 차단
    avoid_print: error
    prefer_const_constructors: warning
    avoid_unnecessary_containers: warning
    use_super_parameters: warning
    dead_code: error
    unused_import: error
    unused_local_variable: error
    invalid_annotation_target: ignore

linter:
  rules:
    # 코드 품질
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    avoid_unnecessary_containers: true
    use_super_parameters: true

    # 타입 안전성
    always_declare_return_types: true
    avoid_dynamic_calls: true
    avoid_returning_null_for_future: true

    # 클래스·함수 설계
    prefer_final_fields: true
    prefer_final_locals: true
    avoid_classes_with_only_static_members: true

    # 불변성
    prefer_const_literals_to_create_immutables: true

    # Flutter 특화
    sized_box_for_whitespace: true
    use_key_in_widget_constructors: true
    avoid_web_libraries_in_flutter: true
