# Stack: Backend Python 3.13 (FastAPI) · Frontend Node 24 (Next.js standalone)
#
# 프로덕션(코드 변경 시 --build 재빌드 필요):
#   docker compose up --build
#
# 개발(hot reload, 소스 volume 마운트):
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up --build
#
# DB만 먼저 올리기:
#   docker compose up pgvector redis neo4j -d

services:
  # ── DB 레이어 ─────────────────────────────────────────────────────────────

  # 1. pgvector — PostgreSQL 17 + pgvector 확장 (관계형 + 벡터 검색)
  #    Neon(외부) 대신 로컬 컨테이너로 데이터 저장
  pgvector:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis — 캐시 · 세션 · 큐
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Neo4j — 그래프 DB (Starcraft Hub 온톨로지)
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # 4. n8n — 워크플로우 자동화 (Gmail 발송 등)
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.seongyuna.cloud
      GENERIC_TIMEZONE: Asia/Seoul
    volumes:
      - n8n_data:/home/node/.n8n
    restart: always


  # 5. Cloudflare Named Tunnel — seongyuna.cloud (api + n8n 외부 노출)
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - ./backend/.env.backend
    restart: always
    depends_on:
      - n8n

  # ── 앱 레이어 ─────────────────────────────────────────────────────────────

  my-backend:
    image: seongyuna/backend:latest
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.backend
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: always
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  # Auth Gateway — auth.seongyuna.cloud. my-backend와 같은 이미지, 엔트리포인트만 다르다.
  # 개인키(JWT_PRIVATE_KEY)는 이 컨테이너의 .env.auth에만 있다.
  # ports: 이 환경의 cloudflared는 host.docker.internal:PORT 방식으로 접근한다(my-backend/n8n과 동일).
  # 사설망(집 PC, 공인 IP 없음)이라 실제 노출 범위는 LAN 내부로 한정된다 — 확인 후 결정.
  auth:
    image: seongyuna/backend:latest
    command: uvicorn auth_main:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    env_file:
      - ./backend/.env.auth
    restart: always
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy

  my-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.seongyuna.cloud
    restart: always
    depends_on:
      - my-backend

volumes:
  pgvector_data:
  redis_data:
  neo4j_data:
  n8n_data:
    external: true  # 기존 계정·워크플로우가 저장된 볼륨 재사용
